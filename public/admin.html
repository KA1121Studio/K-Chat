<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面</title>
  <style>
    body { font-family: "Segoe UI", sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
    h1 { margin-bottom: 20px; font-size: 22px; }
    table { width: 100%; border-collapse: collapse; background: #fff; }
    th, td { padding: 12px; border-bottom: 1px solid #ddd; font-size: 14px; }
    th { background: #eee; text-align: left; }
    button { padding: 6px 12px; border: none; cursor: pointer; border-radius: 5px; background: #ff4b4b; color: white; font-size: 13px; }
    button:hover { background: #ff2f2f; }
    #loginBox { max-width: 300px; margin: 50px auto; }
  </style>
</head>
<body>
  <div id="loginBox" style="display:block;">
    <h2>管理者ログイン</h2>
    <input type="password" id="adminPassword" placeholder="パスワード" style="width:100%; padding:8px;">
    <button id="loginButton" style="margin-top:8px;">ログイン</button>
    <p id="loginError" style="color:red;"></p>
  </div>

  <div id="adminContent" style="display:none;">
    <h1>管理画面（ルーム一覧）</h1>
    <table id="roomTable">
      <tr><th>ID</th><th>ルーム名</th><th>作成者</th><th>作成日時</th><th>削除</th></tr>
    </table>
    <h2>お知らせ編集</h2>
    <textarea id="noticeInput" style="width:100%; height:80px;"></textarea><br><br>
    <button id="saveNoticeButton">保存</button>
  </div>

  <script src="admin.js"></script>
</body>
</html>
